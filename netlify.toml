[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://identity.netlify.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://hook.eu1.make.com https://*.netlify.com https://*.netlify.app; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'"

# Force HTTPS
[[redirects]]
  from = "http://realdevelopments.uk/*"
  to = "https://www.realdevelopments.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.realdevelopments.uk/*"
  to = "https://www.realdevelopments.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/index"
  to = "/"
  status = 301
