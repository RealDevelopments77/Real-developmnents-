# ============================================================
# Decap CMS Configuration — Real Developments Ltd
# ============================================================
# BACKEND OPTIONS:
#
# Option A — Netlify (recommended if hosted on Netlify):
backend:
  name: git-gateway
  branch: main
#
# Option B — GitHub OAuth (if NOT hosted on Netlify):
# Uncomment the block below and comment out Option A above.
# You'll also need to register a GitHub OAuth app at
# github.com/settings/developers and configure a backend server.
#
# backend:
#   name: github
#   repo: your-github-username/real-developments-website
#   branch: main

# Media library — all uploaded images go here
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# ============================================================
# COLLECTIONS
# ============================================================

collections:

  # ── Global Settings (single instance) ──────────────────────
  - name: "global"
    label: "Global Settings"
    files:
      - name: "settings"
        label: "Business Settings"
        file: "content/global.json"
        format: json
        fields:
          - { label: "Business Name", name: "businessName", widget: "string", default: "Real Developments Ltd" }
          - { label: "Phone Number", name: "phone", widget: "string", default: "07435 442212" }
          - { label: "Email Address", name: "email", widget: "string", default: "foreal@realdevelopments.uk" }
          - { label: "Address", name: "address", widget: "string", default: "1 Fiennes Way, Sevenoaks, Kent" }
          - label: "Social Media"
            name: "social"
            widget: "object"
            fields:
              - { label: "Facebook URL", name: "facebook", widget: "string", default: "https://facebook.com/Ryan777g" }
              - { label: "Instagram URL", name: "instagram", widget: "string", default: "https://instagram.com/realdevelopmentsltd" }
              - { label: "LinkedIn URL", name: "linkedin", widget: "string", default: "https://www.linkedin.com/in/ryan-cunningham-988664400" }
              - { label: "WhatsApp Number (international format)", name: "whatsapp", widget: "string", default: "+447435442212" }
          - { label: "Checkatrade Profile URL", name: "checkatradeUrl", widget: "string", default: "https://www.checkatrade.com/trades/realdevelopments" }
          - { label: "Footer Description", name: "footerDesc", widget: "text" }
          - label: "Logo Alt Text"
            name: "logoAlt"
            widget: "string"
            default: "Real Developments Ltd"

  # ── Homepage (single instance) ─────────────────────────────
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "homepage"
        label: "Homepage Content"
        file: "content/homepage.json"
        format: json
        fields:
          # Hero
          - { label: "Hero Headline", name: "heroHeadline", widget: "string" }
          - { label: "Hero Subheading", name: "heroSubheading", widget: "string" }

          # Trust Bar
          - label: "Trust Bar"
            name: "trustBar"
            widget: "object"
            fields:
              - { label: "Stat 1 Label", name: "item1", widget: "string" }
              - { label: "Stat 2 Label", name: "item2", widget: "string" }
              - { label: "Stat 3 Label", name: "item3", widget: "string" }

          # Services Section
          - { label: "Services Section Heading", name: "servicesHeading", widget: "string" }
          - { label: "Services Section Subtitle", name: "servicesSubtitle", widget: "text" }
          - { label: "Service 1 Name", name: "service1Name", widget: "string" }
          - { label: "Service 1 Description", name: "service1Desc", widget: "text" }
          - { label: "Service 2 Name", name: "service2Name", widget: "string" }
          - { label: "Service 2 Description", name: "service2Desc", widget: "text" }
          - { label: "Service 3 Name", name: "service3Name", widget: "string" }
          - { label: "Service 3 Description", name: "service3Desc", widget: "text" }
          - { label: "Service 4 Name", name: "service4Name", widget: "string" }
          - { label: "Service 4 Description", name: "service4Desc", widget: "text" }
          - { label: "Service 5 Name", name: "service5Name", widget: "string" }
          - { label: "Service 5 Description", name: "service5Desc", widget: "text" }
          - { label: "Service 6 Name", name: "service6Name", widget: "string" }
          - { label: "Service 6 Description", name: "service6Desc", widget: "text" }
          - { label: "Service 7 Name", name: "service7Name", widget: "string" }
          - { label: "Service 7 Description", name: "service7Desc", widget: "text" }
          - { label: "Service 8 Name", name: "service8Name", widget: "string" }
          - { label: "Service 8 Description", name: "service8Desc", widget: "text" }

          # Gallery Preview
          - { label: "Gallery Section Heading", name: "galleryHeading", widget: "string" }
          - { label: "Gallery Section Subtitle", name: "gallerySubtitle", widget: "string" }
          - { label: "Gallery Image 1 Label", name: "galleryLabel1", widget: "string" }
          - { label: "Gallery Image 2 Label", name: "galleryLabel2", widget: "string" }
          - { label: "Gallery Image 3 Label", name: "galleryLabel3", widget: "string" }
          - { label: "Gallery Image 4 Label", name: "galleryLabel4", widget: "string" }
          - { label: "Gallery Image 5 Label", name: "galleryLabel5", widget: "string" }

          # Reviews Section
          - { label: "Reviews Section Heading", name: "reviewsHeading", widget: "string" }
          - { label: "Google Review 1 Text", name: "googleReview1Text", widget: "text" }
          - { label: "Google Review 1 Author", name: "googleReview1Author", widget: "string" }
          - { label: "Google Review 2 Text", name: "googleReview2Text", widget: "text" }
          - { label: "Google Review 2 Author", name: "googleReview2Author", widget: "string" }
          - { label: "Google Review 3 Text", name: "googleReview3Text", widget: "text" }
          - { label: "Google Review 3 Author", name: "googleReview3Author", widget: "string" }
          - { label: "Checkatrade Review 1 Text", name: "checkatradeReview1Text", widget: "text" }
          - { label: "Checkatrade Review 1 Author", name: "checkatradeReview1Author", widget: "string" }
          - { label: "Checkatrade Review 2 Text", name: "checkatradeReview2Text", widget: "text" }
          - { label: "Checkatrade Review 2 Author", name: "checkatradeReview2Author", widget: "string" }
          - { label: "Checkatrade Review 3 Text", name: "checkatradeReview3Text", widget: "text" }
          - { label: "Checkatrade Review 3 Author", name: "checkatradeReview3Author", widget: "string" }

          # Coverage Section
          - { label: "Coverage Section Heading", name: "coverageHeading", widget: "string" }
          - { label: "Coverage Section Subtitle", name: "coverageSubtitle", widget: "string" }
          - label: "Coverage Area Localities"
            name: "coverageAreas"
            widget: "list"
            allow_add: true
            field: { label: "Location", name: "location", widget: "string" }

          # CTA Section
          - { label: "CTA Heading", name: "ctaHeading", widget: "string" }
          - { label: "CTA Text", name: "ctaText", widget: "text" }

  # ── About Page ─────────────────────────────────────────────
  - name: "about"
    label: "About Page"
    files:
      - name: "about"
        label: "About Page Content"
        file: "content/about.json"
        format: json
        fields:
          - { label: "Page H1", name: "pageH1", widget: "string" }
          - { label: "Page Subheading", name: "pageSubheading", widget: "string" }
          - { label: "Story Heading", name: "storyH2", widget: "string" }
          - { label: "Story Paragraph 1", name: "storyPara1", widget: "text" }
          - { label: "Story Paragraph 2", name: "storyPara2", widget: "text" }
          - { label: "Story Paragraph 3", name: "storyPara3", widget: "text" }
          - { label: "Ryan Section Heading", name: "ryanH2", widget: "string" }
          - { label: "Ryan Subtitle", name: "ryanSubtitle", widget: "string" }
          - { label: "Ryan Bio Paragraph 1", name: "ryanBio1", widget: "text" }
          - { label: "Ryan Bio Paragraph 2", name: "ryanBio2", widget: "text" }
          - { label: "Ryan Quote", name: "ryanQuote", widget: "string" }
          - { label: "Values Heading", name: "valuesHeading", widget: "string" }
          - { label: "Value 1 Title", name: "value1Title", widget: "string" }
          - { label: "Value 1 Text", name: "value1Text", widget: "text" }
          - { label: "Value 2 Title", name: "value2Title", widget: "string" }
          - { label: "Value 2 Text", name: "value2Text", widget: "text" }
          - { label: "Value 3 Title", name: "value3Title", widget: "string" }
          - { label: "Value 3 Text", name: "value3Text", widget: "text" }
          - { label: "Value 4 Title", name: "value4Title", widget: "string" }
          - { label: "Value 4 Text", name: "value4Text", widget: "text" }
          - { label: "Value 5 Title", name: "value5Title", widget: "string" }
          - { label: "Value 5 Text", name: "value5Text", widget: "text" }
          - { label: "Value 6 Title", name: "value6Title", widget: "string" }
          - { label: "Value 6 Text", name: "value6Text", widget: "text" }
          - { label: "CTA Heading", name: "ctaHeading", widget: "string" }
          - { label: "CTA Text", name: "ctaText", widget: "text" }

  # ── Contact Page ────────────────────────────────────────────
  - name: "contact"
    label: "Contact Page"
    files:
      - name: "contact"
        label: "Contact Page Content"
        file: "content/contact.json"
        format: json
        fields:
          - { label: "Page H1", name: "pageH1", widget: "string" }
          - { label: "Page Subheading", name: "pageSubheading", widget: "string" }
          - { label: "Section Heading", name: "heading", widget: "string" }
          - { label: "Intro Text", name: "introText", widget: "text" }
          - label: "Form Webhook URL"
            name: "webhookUrl"
            widget: "string"
            hint: "Make.com webhook URL. Only change if instructed by Club Matic."

  # ── Services Page ───────────────────────────────────────────
  - name: "services_page"
    label: "Services Page"
    files:
      - name: "services_page"
        label: "Services Page Content"
        file: "content/services-page.json"
        format: json
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Page Subtitle", name: "subtitle", widget: "text" }
          - { label: "Card 1 Title", name: "card1Title", widget: "string" }
          - { label: "Card 1 Description", name: "card1Desc", widget: "text" }
          - { label: "Card 2 Title", name: "card2Title", widget: "string" }
          - { label: "Card 2 Description", name: "card2Desc", widget: "text" }
          - { label: "Card 3 Title", name: "card3Title", widget: "string" }
          - { label: "Card 3 Description", name: "card3Desc", widget: "text" }
          - { label: "Pricing Heading", name: "pricingHeading", widget: "string" }
          - { label: "Pricing Text", name: "pricingText", widget: "text" }
          - { label: "CTA Heading", name: "ctaHeading", widget: "string" }
          - { label: "CTA Text", name: "ctaText", widget: "text" }

  # ── Gallery Page ────────────────────────────────────────────
  - name: "gallery_page"
    label: "Gallery"
    files:
      - name: "gallery_page"
        label: "Gallery Page Content & Images"
        file: "content/gallery.json"
        format: json
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Page Subtitle", name: "subtitle", widget: "string" }
          - { label: "CTA Heading", name: "ctaHeading", widget: "string" }
          - { label: "CTA Text", name: "ctaText", widget: "text" }
          - label: "Gallery Images"
            name: "items"
            widget: "list"
            fields:
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Caption", name: "caption", widget: "string", required: false }
              - { label: "Sort Order", name: "order", widget: "number", value_type: "int", default: 1 }

  # ── Google Reviews (folder collection) ─────────────────────
  - name: "google_reviews"
    label: "Google Reviews"
    folder: "content/reviews/google"
    create: true
    format: json
    slug: "{{slug}}"
    fields:
      - { label: "Reviewer Name", name: "name", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Review Text", name: "text", widget: "text" }
      - { label: "Rating (1–5)", name: "rating", widget: "number", value_type: "int", min: 1, max: 5, default: 5 }

  # ── Checkatrade Reviews (folder collection) ─────────────────
  - name: "checkatrade_reviews"
    label: "Checkatrade Reviews"
    folder: "content/reviews/checkatrade"
    create: true
    format: json
    slug: "{{slug}}"
    fields:
      - { label: "Reviewer Name", name: "name", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Review Text", name: "text", widget: "text" }
      - { label: "Rating (1–5)", name: "rating", widget: "number", value_type: "int", min: 1, max: 5, default: 5 }

  # ── SEO: Groundworks Sevenoaks ──────────────────────────────
  - name: "seo_sevenoaks"
    label: "SEO: Groundworks Sevenoaks"
    files:
      - name: "sevenoaks"
        label: "Groundworks Sevenoaks Page"
        file: "content/seo/sevenoaks.json"
        format: json
        fields:
          - { label: "H1 Headline", name: "h1", widget: "string", default: "Groundworks Sevenoaks" }
          - { label: "Intro Paragraph", name: "intro", widget: "text" }
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - { label: "Question", name: "q", widget: "string" }
              - { label: "Answer", name: "a", widget: "text" }

  # ── SEO: Foundations Tonbridge ──────────────────────────────
  - name: "seo_tonbridge"
    label: "SEO: Foundations Tonbridge"
    files:
      - name: "tonbridge"
        label: "Foundations Tonbridge Page"
        file: "content/seo/tonbridge.json"
        format: json
        fields:
          - { label: "H1 Headline", name: "h1", widget: "string", default: "Concrete Foundations Tonbridge" }
          - { label: "Intro Paragraph", name: "intro", widget: "text" }
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - { label: "Question", name: "q", widget: "string" }
              - { label: "Answer", name: "a", widget: "text" }

  # ── SEO: Paving Tunbridge Wells ─────────────────────────────
  - name: "seo_tunbridge_wells"
    label: "SEO: Paving Tunbridge Wells"
    files:
      - name: "tunbridge_wells"
        label: "Paving Tunbridge Wells Page"
        file: "content/seo/tunbridge-wells.json"
        format: json
        fields:
          - { label: "H1 Headline", name: "h1", widget: "string", default: "Porcelain Paving Tunbridge Wells" }
          - { label: "Intro Paragraph", name: "intro", widget: "text" }
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - { label: "Question", name: "q", widget: "string" }
              - { label: "Answer", name: "a", widget: "text" }
