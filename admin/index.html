<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Admin | Real Developments Ltd</title>

  <!--
    DECAP CMS ADMIN PANEL
    =====================
    This page provides the content management interface for Ryan Cunningham
    to edit site content without touching code.

    DEFAULT AUTH: Netlify Identity (recommended for Netlify-hosted sites)
    ALTERNATIVE:  GitHub OAuth — see config.yml for backend switching instructions

    To set up Netlify Identity:
    1. Log in to app.netlify.com and open the Real Developments site
    2. Go to Site settings > Identity > Enable Identity
    3. Under Registration, set to "Invite only"
    4. Scroll to Services > Git Gateway > Enable Git Gateway
    5. Go to Identity > Invite users, enter foreal@realdevelopments.uk
    6. Ryan will receive an email — he clicks the link to set a password
    7. He can now log in at yourdomain.com/admin/ to manage content
  -->

  <!-- Netlify Identity widget (required for Netlify Identity auth) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Decap CMS script — loads the full admin UI -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
